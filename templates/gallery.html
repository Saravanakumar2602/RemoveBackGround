<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1e1e2f;
            color: #e0e0e0;
            padding: 40px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .gallery img {
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gallery p {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #bbb;
        }

        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 20px;
            background: #6c5ce7;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .back-button:hover {
            background: #5a4bcf;
        }
    </style>
</head>
<body>
    <h1>Uploaded Gallery</h1>
    <div class="gallery">
        {% for image in images %}
        <div>
            <img src="{{ url_for('static', filename=image.filename) }}" alt="Image">
            <p>{{ image.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</p>
        </div>
        {% endfor %}
    </div>

    <!-- Back to Home Button -->
    <a class="back-button" href="{{ url_for('index') }}">⬅ Back to Home</a>
</body>
</html>
