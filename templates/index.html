<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Remover</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #1e1e2f;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        form {
            background: #2a2a40;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            align-items: center;
        }

        input[type="file"] {
            background: #3a3a50;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
        }

        button {
            background-color: #00b894;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #00a183;
        }

        .preview-section {
            margin-top: 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .download-link {
            display: inline-block;
            background: #0984e3;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .download-link:hover {
            background: #74b9ff;
        }

        #imagePreviewContainer {
            display: none;
            margin-top: 10px;
            text-align: center;
        }

        #imagePreview {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .next-button {
            background-color: #6c5ce7;
            color: #fff;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
        }

        .next-button:hover {
            background-color: #5a4bcf;
        }
    </style>
</head>
<body>
    <h1>Remove Image Background</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" id="imageInput" accept="image/*" required onchange="previewImage(event)">
        <button type="submit">Upload & Remove Background</button>
        <div id="imagePreviewContainer">
            <h3>Preview Before Upload</h3>
            <img id="imagePreview" src="#" alt="Selected Image Preview">
        </div>
    </form>

    {% if filename %}
    <div class="preview-section">
        <h2>Processed Image</h2>
        <img src="{{ url_for('static', filename=filename) }}" alt="Processed Image">
        <br>
        <a class="download-link" href="{{ url_for('static', filename=filename) }}" download>Download</a>
        <br><br>
        <button onclick="startNew()" class="next-button">Next Image</button>
    </div>
    {% endif %}

    <script>
        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('imagePreview');
            const container = document.getElementById('imagePreviewContainer');

            const reader = new FileReader();
            reader.onload = function () {
                preview.src = reader.result;
                container.style.display = 'block';
            }
            if (input.files[0]) {
                reader.readAsDataURL(input.files[0]);
            }
        }

        function startNew() {
            document.querySelector('form').reset();
            document.getElementById('imagePreviewContainer').style.display = 'none';
            window.location.href = "/";
        }
    </script>
</body>
</html>
